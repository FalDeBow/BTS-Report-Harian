<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Kunjungan Lapangan BTS</title>
  <!-- Bootstrap 5 CSS untuk Tampilan Rapi & Responsive -->
  <link href="https://cdn.jsdelivr.net/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border-radius: 12px; border: none; }
    .card-header { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; }
    .form-label { font-weight: 600; color: #333; }
    .btn-primary { background-color: #0d6efd; border: none; padding: 10px 20px; font-weight: 600; }
    .btn-primary:hover { background-color: #0b5ed7; }
  </style>
</head>
<body class="py-4">

  <div class="container" style="max-width: 600px;">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0 fw-bold">📡 Laporan Harian BTS</h4>
        <small>Form Input Kunjungan Lapangan Teknisi</small>
      </div>
      <div class="card-body p-4">
        
        <form id="btsForm">
          
          <!-- Tanggal Kunjungan -->
          <div class="mb-3">
            <label for="tanggal" class="form-label">Tanggal Kunjungan</label>
            <input type="date" class="form-control" id="tanggal" required>
          </div>

          <!-- Nama Teknisi -->
          <div class="mb-3">
            <label for="teknisi" class="form-label">Nama Teknisi</label>
            <input type="text" class="form-control" id="teknisi" placeholder="Masukkan nama Anda" required>
          </div>

          <!-- Nama Titik / Site Baku -->
          <div class="mb-3">
            <label for="site" class="form-label">Titik Lokasi / Site (Baku)</label>
            <input list="daftar-site" class="form-control" id="site" placeholder="Ketik atau pilih nama site..." required>
            <datalist id="daftar-site">
              <option value="STR-BTS01 - Site Cawang">
              <option value="STR-BTS02 - Site Tebet">
              <option value="STR-BTS03 - Site Pancoran">
              <option value="STR-BTS04 - Site Sunter">
            </datalist>
            <div class="form-text">Pilih dari daftar baku yang tersedia.</div>
          </div>

          <!-- Status Pekerjaan -->
          <div class="mb-3">
            <label for="status" class="form-label">Status Pekerjaan</label>
            <select class="form-select" id="status" required>
              <option value="">-- Pilih Status --</option>
              <option value="Normal / Routin PM">Normal / Routine PM</option>
              <option value="Troubleshooting / Repair">Troubleshooting / Repair</option>
              <option value="Emergency Response">Emergency Response</option>
            </select>
          </div>

          <!-- Catatan / Detail Pekerjaan -->
          <div class="mb-3">
            <label for="catatan" class="form-label">Detail Pekerjaan / Catatan</label>
            <textarea class="form-control" id="catatan" rows="3" placeholder="Tuliskan tindakan yang dilakukan..." required></textarea>
          </div>

          <!-- Tombol Kirim -->
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary" id="btnSubmit">Kirim Laporan</button>
          </div>

        </form>

        <!-- Status Pengiriman Data -->
        <div id="responseMessage" class="mt-3 text-center fw-bold"></div>

      </div>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // TEMPELKAN URL APPS SCRIPT ANDA DI ANTARA TANDA PETIK DI BAWAH INI:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4Mq-TGyssl9hu421IznLBE7ifhH_jfR6qzZu75iAaAwjfK0BRLqanB0BAwJ6bILzR/exec";
    // -------------------------------------------------------------

    document.getElementById('btsForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btnSubmit = document.getElementById('btnSubmit');
      const responseMessage = document.getElementById('responseMessage');
      
      btnSubmit.disabled = true;
      btnSubmit.innerText = "Mengirim Data...";
      responseMessage.innerText = "";

      const formData = {
        tanggal: document.getElementById('tanggal').value,
        teknisi: document.getElementById('teknisi').value,
        site: document.getElementById('site').value,
        status: document.getElementById('status').value,
        catatan: document.getElementById('catatan').value
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(formData)
      })
      .then(res => res.json())
      .then(data => {
        responseMessage.style.color = "green";
        responseMessage.innerText = "✅ Laporan Berhasil Terkirim!";
        document.getElementById('btsForm').reset();
        btnSubmit.disabled = false;
        btnSubmit.innerText = "Kirim Laporan";
      })
      .catch(error => {
        responseMessage.style.color = "red";
        responseMessage.innerText = "❌ Gagal Mengirim Data. Cek Koneksi / URL Apps Script.";
        btnSubmit.disabled = false;
        btnSubmit.innerText = "Kirim Laporan";
      });
    });
  </script>

</body>
</html>
